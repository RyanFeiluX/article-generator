# Article Generator - Docker Compose
# Single container serves both Frontend & API
# Usage: docker-compose up --build

version: '3.8'

services:
  article-generator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: article-generator
    ports:
      - "5000:5000"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - article-generator-config:/app/backend
    restart: unless-stopped

volumes:
  article-generator-config:
