# Article Generator - Docker Compose
# Single container serves both Frontend & API
# Usage: docker-compose up --build

version: '3.8'

services:
  article-generator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: article-generator
    ports:
      - "5000:5000"
    environment:
      - PYTHONUNBUFFERED=1
      - ARK_API_KEY=${ARK_API_KEY:-}
      - ARK_MODEL=${ARK_MODEL:-ep-20260413174919-nqclc}
      - ARK_BASE_URL=${ARK_BASE_URL:-https://ark.cn-beijing.volces.com/api/v3}
    restart: unless-stopped
